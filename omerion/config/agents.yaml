# ═══════════════════════════════════════════════════════════════════════
# Omerion Agent Configuration — General Industry AI Automation Agency
#
# Per-agent variables consumed at runtime by every agent. Omerion builds
# custom AI automation systems for operations leaders, founders, revenue
# teams, agencies, SaaS companies, e-commerce operators, professional
# services firms, and HR/finance teams — any industry.
#
# The four internal systems (DAAM / ORIA / RORA / ASAP) are live demos
# we reference on discovery calls to prove each pattern at production scale.
#
# First-persona focus: SME Founder + Operations Leader (highest weights).
# ═══════════════════════════════════════════════════════════════════════

global:
  hitl_escalation_minutes: 60
  hitl_max_regeneration_retries: 3
  telemetry_flush_interval_seconds: 30
  default_rate_limit_backoff_seconds: [4, 15, 60]

# (Removed 2026-06-15: the `mcp_integrations.discord` block was dead config —
#  referenced by zero Python. Discord I/O happens via webhooks in
#  omerion_core/activity_logger.py + inbound/discord_route.py. Runtime is
#  LangGraph-only; no MCP server is mounted.)

# ─── Shared persona taxonomy (9 personas, 3 tiers) ─────────────────────
# Used by market_mapper, lead_enricher, icp_scoring, offer_matching,
# linkedin_outreach, outcome_attribution. Edit in one place only.
personas:
  # Tier 1 — core ICP
  ops_leader:
    tier: 1
    priority: 1
    archetype: "system_multiplier"
    role_terms: ["COO", "VP Operations", "Director of Operations", "Head of Ops", "Operations Manager"]
    problem_hypothesis: "running manual processes across 10-100 person org; no shared automation layer; reporting takes days not minutes"
    kpis: ["process_cycle_time_days", "automation_adoption_rate", "manual_task_reduction_pct"]
  revenue_leader:
    tier: 1
    priority: 2
    archetype: "high_velocity"
    role_terms: ["VP Sales", "Head of Revenue", "CRO", "Sales Director", "Revenue Operations Lead"]
    problem_hypothesis: "pipeline visibility is poor; speed-to-lead is slow; reps spend 60%+ of time on non-selling tasks"
    kpis: ["speed_to_lead_minutes", "pipeline_conversion_rate", "revenue_per_rep"]
  sme_founder:
    tier: 1
    priority: 3
    archetype: "system_multiplier"
    role_terms: ["CEO", "Founder", "Co-Founder", "Owner", "Managing Director"]
    problem_hypothesis: "personally in the weeds on ops; can't delegate without losing quality; growth is capped by owner bandwidth"
    kpis: ["owner_hours_saved_weekly", "revenue_growth_rate", "customer_acquisition_cost"]
  agency_owner:
    tier: 1
    priority: 4
    archetype: "system_multiplier"
    role_terms: ["Agency Owner", "Founder", "CEO", "Managing Partner", "Principal"]
    problem_hypothesis: "client delivery is labor-intensive; margins erode as headcount scales; no repeatable AI-augmented delivery playbook"
    kpis: ["project_margin_pct", "client_retention_rate", "deliverable_cycle_days"]
  ecommerce_operator:
    tier: 1
    priority: 5
    archetype: "high_velocity"
    role_terms: ["Head of E-commerce", "DTC Founder", "VP Growth", "Director of Digital", "Shopify/Amazon Operator"]
    problem_hypothesis: "abandoned cart recovery is manual; customer support is reactive; ad spend attribution is blind"
    kpis: ["cart_recovery_rate", "avg_order_value", "return_rate_pct"]
  # Tier 2 — professional services buyers
  professional_services_owner:
    tier: 2
    priority: 6
    archetype: "capital_allocator"
    role_terms: ["Managing Partner", "Principal", "Director", "Practice Lead", "Owner"]
    problem_hypothesis: "billable hours consumed by intake, research, and admin; client onboarding is slow; no AI layer on knowledge management"
    kpis: ["billable_hours_saved", "client_onboarding_days", "matter_throughput"]
  saas_founder:
    tier: 2
    priority: 7
    archetype: "system_multiplier"
    role_terms: ["CEO", "CTO", "Founder", "Head of Product", "VP Engineering"]
    problem_hypothesis: "churn is above 5%; activation funnel is leaking; support tickets are a growth blocker"
    kpis: ["churn_rate", "activation_rate", "support_ticket_resolution_hours"]
  # Tier 3 — talent & finance
  hr_talent_leader:
    tier: 3
    priority: 8
    archetype: "system_multiplier"
    role_terms: ["VP People", "Head of Talent", "Recruiting Director", "CHRO", "People Operations Lead"]
    problem_hypothesis: "time-to-hire is 45+ days; offer acceptance is under 70%; retention programs are generic"
    kpis: ["time_to_hire_days", "offer_acceptance_rate", "retention_rate"]
  finance_ops:
    tier: 3
    priority: 9
    archetype: "system_multiplier"
    role_terms: ["CFO", "Controller", "VP Finance", "Finance Director", "Head of Finance"]
    problem_hypothesis: "month-end close takes 7+ days; reconciliation is manual; financial reporting is reactive not predictive"
    kpis: ["close_cycle_days", "reconciliation_hours_saved", "report_turnaround_hours"]

# ─── Consulting offer packages ────────────────────────────────────────
# Each package resolves a specific business problem; demo_reference is the
# live running system we show on discovery calls to prove the pattern.
