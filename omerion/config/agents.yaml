# ─── COMPLIANCE_CHECKER (Agent #33) — Business Rule Enforcement ─────────
compliance_checker:
  triggers:
    - cron
    - event:client.onboarded
    - event:deployment.live
  schedule:
    cron: "0 1 * * *"   # 01:00 America/Toronto nightly
  cognition:
    engine: deterministic_with_weekly_llm_report
    tier: default
  scan_window_hours: 24
  data_retention_days: 90
  weekly_report_day: 0   # 0 = Monday

# ─── SECURITY_AUDITOR (Agent #34) — Proactive Security Scanning ─────────
security_auditor:
  triggers:
    - cron
    - event:deployment.live
  schedule:
    cron: "30 0 * * *"   # 00:30 America/Toronto nightly
  cognition:
    engine: deterministic_with_weekly_llm_brief
    tier: default
  weekly_report_day: 0   # 0 = Monday

# ─── Agent #10 — Outcome Attribution & Feedback ────────────────────────
  # KPI definitions now sourced from top-level `personas[*].kpis`.

# ─── Agent R1 — Market/Tech Watcher ────────────────────────────────────

# ─── Agent R2 — Open-Source Scout & Reverse-Engineer ───────────────────
r2_oss_scout:
  # ── Trigger (TWATR-T): managed_agent_cron + event rd.insight.created (R1). The
  # insight now SEEDS discovery (focuses the GitHub search on R1's signal); cron
  # runs fall back to the static search_tags below.
  # ── Cognition (TWATR-A): per-repo rubric scoring — Haiku base (Tier.FAST), escalate
  # to Sonnet (Tier.DEFAULT) only when risk>0.5. No HITL (internal R&D data).
  # No semantic dedup needed — repo_url is a canonical key (unlike R1's multi-URL stories).
  cognition:
    engine: claude_router_tiered
    base_tier: fast
    escalation_tier: default
    escalation_risk_threshold: 0.5
  min_stars: 150
  search_tags:
    - agent orchestration
    - RAG
    - workflow automation
    - AI process automation
    - LangGraph
    - webhook integrations
    - document processing AI
    - data extraction automation
  integration_type_options:
    - component
    - pattern
    - full_module
    - reference_only

# ─── Agent R3 — Strategic Workflow Architect ───────────────────────────
r3_strategic_architect:
  # ── Trigger (TWATR-T): managed_agent_cron (primary) + batch/sparse events
  # (analysis.ready, dossier.ready, attribution.report.ready). NOT the per-item
  # rd.insight.created / oss.candidate.scored — R3 synthesizes, it doesn't react.
  # ── Cognition (TWATR-A): single-shot OPUS multi-source synthesis over a 14-day
  # signal window → DesignProposal[]. No collapse needed.
  # ── HITL: founder approves EVERY proposal before RD_PROPOSAL_SUBMITTED → build
  # pipeline (gate-all; replay-idempotent). Not a G1-G4 gate — a roadmap approval.
  cognition:
    engine: claude_router_single_shot
    tier: heavy
  lookback_days: 14
  prioritization_axes:
    impact: [low, medium, high]
    effort: [S, M, L, XL]
  synthesis_buckets:
    - consulting_service_ideas
    - general_industry_insights
    - internal_os_improvements
  # ── RAG (added Wave-RAG): semantic memory of SHAPE's own decided proposals.
  # Lets R3 recall approved precedent + avoid re-proposing rejected ideas.
  pinecone:
    namespace: intelligence_r3          # single index omerion-legion-rag, cosine
    department: intelligence
    embed_source: "title + problem_statement + hypothesis"
    retrieval_threshold: 0.80           # wider net for few-shot recall
    dedup_soft: 0.90                    # is_apparent_duplicate=true
    dedup_hard: 0.96                    # silent skip
    top_k: 3                            # policy cap; rerank if cross-encoder added
    writer: omerion/agents/r3_strategic_architect/signals.py
  token_budget: 1400                    # total per-run context tokens
  obsidian:
    vault_dir: obsidian-vault/r3-strategic-architect
    files:
      - signal-synthesis-guide.md       # ## Approved Patterns = write-back loop
      - proposal-dedup-policy.md        # retrieval vs dedup thresholds
      - rice-formula.md
      - proposal-templates.md
      - module-package-mapping.md
    section_token_cap: 400

# ─── Agent R4 — Evaluation & Telemetry ─────────────────────────────────
r4_evaluation_telemetry:
  comparison_window_days: 14
  regression_thresholds:
    latency_p95_ms: 15000
    cost_per_run_usd: 2.00
    success_rate: 0.90
  alert_channels:
    - log
    - discord

# ─── Agent #19 — AUDITOR — Constitutional Guardian (RSI Department) ──────────

# ─── Agent BIZ DEV OUTREACH — finds consulting clients via freelance/postings ──
biz_dev_outreach:
  # ─── Run-level controls ──────────────────────────────────────────────
  target_platforms:
    # Tier S — invite-only / curated
    - toptal
    - ateam
    - braintrust
    - contra
    # Tier A — high-signal startup / growth-stage employer boards
    - wellfound
    - yc
    - lever
    - greenhouse
    # Tier B — volume freelance + general boards
    - upwork
    - linkedin_jobs
    - indeed
  max_postings_per_platform: 15
  min_relevance_score: 0.65
  min_rank_score: 7.0
  top_n_to_draft: 5
  ghost_threshold_days: 14
  daily_application_cap: 3
  hitl_required: true
  discord_channel: seek
  resume_path: "assets/evykynn/resume.md"
  cover_letter_path: "assets/evykynn/cover_letter.md"

  # ─── Persona / specialty signals fed to RANK_SYSTEM ──────────────────
  target_categories:
    - AI automation consulting
    - LangGraph / multi-agent systems
    - Freelance AI engineering
    - Business process automation
    - Conversational revenue systems
