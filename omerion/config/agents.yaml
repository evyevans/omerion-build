  revenue_acceleration_engine:
    demo_reference: DAAM
    target_archetype: "high_velocity"
    problem: "leads leaking due to slow speed-to-lead and fragmented follow-up across channels"
    outcomes: ["sub-60s speed-to-lead", "2x appointment-set rate", "unified inbox across SMS/email/DM"]
    price_band: { min: 5000, max: 15000 }
    typical_timeline_weeks: 4
  ops_intelligence_layer:
    demo_reference: CAPA
    target_archetype: "system_multiplier"
    problem: "executives wasting time manually updating CRMs and managing calendars"
    outcomes: ["voice-driven CRM updates", "autonomous calendar conflict resolution", "instant email drafting"]
    price_band: { min: 15000, max: 40000 }
    typical_timeline_weeks: 8
  research_decision_stack:
    demo_reference: REMI
    target_archetype: "capital_allocator"
    problem: "strategic research and real estate market intelligence trapped in slow manual processes"
    outcomes: ["overnight full market analysis", "24/7 auto-scouting", "ranked decision briefs"]
    price_band: { min: 25000, max: 60000 }
    typical_timeline_weeks: 10
  process_automation_suite:
    demo_reference: ASAP
    target_archetype: "system_multiplier"
    problem: "high-volume repetitive processes lacking closed-loop accountability to revenue targets"
    outcomes: ["revenue target reverse-engineering", "automated workflow orchestration", "compliance and QA automation"]
    price_band: { min: 15000, max: 35000 }
    typical_timeline_weeks: 6

