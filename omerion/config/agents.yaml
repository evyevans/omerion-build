# ─── Agent #1 — Market Mapper ──────────────────────────────────────────
market_mapper:
  # ── Trigger (TWATR-T): weekly autonomous discovery via the runtime scheduler
  # (lifecycle path, NOT skill-frontmatter direct-dispatch) + on-demand inline calls
  # from the enricher (market_search intent).
  schedule:
    enabled: true
    cron: "0 6 * * 1"           # 06:00 Mondays America/Toronto — weekly account discovery
  # ── Cognition (TWATR-A): per-account Haiku persona classify + deterministic rank.
  # No HITL — accounts are companies, not people (the G2 gate is downstream in the
  # enricher's contact writes).
  cognition:
    engine: claude_router_single_shot
    tier: fast
  target_industries:
    - Digital Marketing & Advertising
    - SaaS & B2B Software
    - Professional Services (Legal, Accounting, Consulting)
    - E-commerce & DTC Brands
    - Staffing & HR Firms
  data_sources:
    - Apollo.io (company + contact enrichment)
    - Crunchbase (funding signals and company metadata)
    - LinkedIn Sales Navigator
    - Google Maps Places API
    - industry association directories
  account_score_weights:
    volume: 0.35
    persona_fit: 0.45
    tech_maturity: 0.20
  min_volume_threshold: 50
  min_team_size: 3
  min_final_score: 0.0   # Minimum final_score to qualify when structured data is present
  refresh_cadence_days: 7
  persona_tier_priority: [1, 2, 3]   # tier-1 personas harvested first

# ─── Agent #2 — High-Quality Lead Scraping ─────────────────────────────
high_quality_lead_scraping:
  max_accounts_per_cycle: 15
  min_research_depth: 3
  # ── Trigger (TWATR-T): reactive #leads + proactive daily cron ──
  # The cron is registered in omerion_core/runtime/scheduler.py and goes through
  # the full run lifecycle (create_run → execute_run), NOT a direct handler call,
  # so HITL pause/resume + cost watchdog apply exactly as for a Discord run.
  schedule:
    enabled: true
    cron: "0 9 * * *"          # 09:00 America/Toronto — proactive priority-account research
  # ── Cognition (TWATR-A): one autonomous tool-use loop (cognition.py) ──
  # Engine is ClaudeRouter tool-use (no Claude CLI dependency); swappable to
  # claude-agent-sdk later behind the same research_account() interface.
  cognition:
    engine: claude_router_tool_loop
    tier: heavy
    max_turns: 10
  # ── RAG (TWATR-R): semantic dedup against the `dossiers` namespace ──
  dedup:
    namespace: dossiers
    hard_skip: 0.96            # ≥ → already dossiered elsewhere; skip persist
    soft_flag: 0.90            # ≥ (and < hard) → flag for founder in the HITL card
  quality_flags:
    - founder-led
    - tech-forward
    - actively-hiring
    - recently-expanded
    - recently-funded
    - growing-team
  disqualification_flags:
    - retiring
    - inactive
    - already-client
    - recent-acquisition
  research_targets:
    - headcount_growth_last_6mo
    - recent_funding_or_press
    - tech_stack_fingerprint
    - hiring_signals
    - recent_product_or_service_launch
  dossier_template_fields:
    - summary
    - track_record
    - current_niche
    - pain_signals
    - outreach_angle
    - conversation_hooks
    - offer_match

# ─── Agent #3 — Lead Scraper & Enricher ────────────────────────────────
lead_scraper_enricher:
  max_contacts_per_account: 3
  enrichment_provider_priority:
    - hunter        # only Hunter.io is wired today (apollo/clearbit not implemented)
  dedup_fields:
    - email
    - linkedin_url
    - "name+domain"
  # ── Trigger (TWATR-T): event-driven (account.batch.ready from MAP) + reactive #scout.
  # No cron — enrichment is demand-driven by upstream discovery.
  # ── Cognition (TWATR-A): one autonomous tool-use loop per account (cognition.py).
  cognition:
    engine: claude_router_tool_loop
    tier: default          # Sonnet — filter real contacts + classify + verify emails
    max_turns: 8
  # role_terms and problem_hypothesis are sourced from top-level `personas`.
  # Override here only if a persona needs a per-enrichment-step adjustment.

# ─── Agent #4 — LinkedIn Cold & Warm Outreach ──────────────────────────
linkedin_outreach:
  # RAG decision (Wave-RAG): Pinecone NONE — Supabase-sufficient. "Best template
  # per persona by reply/acceptance rate" is an exact GROUP BY (template, persona)
  # aggregation over discrete enumerated templates, not a semantic-similarity query.
  # The proposed `linkedin_signals` namespace stays design-only/deferred until
  # free-form message generation (not templated sequences) would need semantic recall.
  rag_decision: pinecone_none_supabase_sufficient
  daily_connection_limit: 25
  daily_message_limit: 40
  warm_contact_threshold:
    email_reply: true
    event_attended: true
    mutual_engagement: true
  # Nine persona variants mapped to new general ICP. Templates live in
  # agents/linkedin_outreach/templates/ keyed by `{persona}_{variant}`.
  persona_variants:
    - ops_leader
    - revenue_leader
    - sme_founder
    - agency_owner
    - ecommerce_operator
    - professional_services_owner
    - saas_founder
    - hr_talent_leader
    - finance_ops
  cold_sequence_steps:
    - { day: 0, type: connection_request, template: "{persona}_cold_connection_v1" }
    - { day: 3, type: dm, template: "{persona}_cold_followup_hook_v1" }
    - { day: 7, type: dm, template: "{persona}_cold_case_study_v1" }
  warm_sequence_steps:
    - { day: 0, type: dm, template: "{persona}_warm_reopen_v1" }
    - { day: 4, type: dm, template: "{persona}_warm_offer_v1" }
  personalization_fields:
    - first_name
    - company
    - pain_signal
    - industry
    - outreach_hook
    - persona_variant
  stop_conditions:
    - meeting_booked
    - explicit_no
    - replied
    - do_not_contact

# ─── Agent #5 — CRM Warm Leads Nurture ─────────────────────────────────
crm_nurture:
  # ── Trigger (TWATR-T): event (contact.scored) + reactive #nurture + daily cron sweep.
  # The cron is registered in omerion_core/runtime/scheduler.py through the full run
  # lifecycle (create_run → execute_run), so the G1 send-gate + cost watchdog apply.
  schedule:
    enabled: true
    cron: "0 13 * * *"         # 13:00 America/Toronto — daily nurture sweep of due contacts
  # ── Cognition (TWATR-A): single-shot Sonnet draft (persona-mapped, style-guarded,
  # RAG winning-angle injected). Drafting is inherently single-shot; deterministic
  # cooldown/stop-condition gates stay in Python (hard rules, not model discretion).
  cognition:
    engine: claude_router_single_shot
    tier: default
  lead_stages:
    - new_lead
    - contacted
    - engaged
    - proposal_sent
    - meeting_booked
    - won
    - lost
  cooldown_periods:
    new_lead: 2
    contacted: 4
    engaged: 3
    proposal_sent: 5
  stop_conditions:
    - meeting_booked
    - explicit_no
    - signed_agreement
    - do_not_contact
  escalation_threshold:
    opens_in_24h: 3
    link_clicks: 1
  content_pillars:
    - ai_automation_case_studies
    - consulting_case_studies
    - workflow_automation_primers
    - prompt_engineering_tips
    - demo_walkthroughs
  personalization_fields:
    - first_name
    - persona
    - pain_signal
    - industry
    - last_touch_reference
  # ── Ghost follow-up sequences (steps 4-5, triggered after initial sequence exhausted) ──
  ghost_threshold_days: 21
  max_sequence_steps: 5
  ghost_followup_sequence:
    - { step: 4, channel: email, angle: "case_study",  template: "{persona}_ghost_case_study_v1", delay_days: 7 }
    - { step: 5, channel: sms,   angle: "break_up",    template: "{persona}_ghost_breakup_v1",    delay_days: 7 }
  # ── RAG Traction — Pinecone outreach_signals flywheel ──────────────────
  rag_enabled: true
  rag_namespace: outreach_signals
  rag_top_k: 5
  rag_min_similarity: 0.72

# ─── Agent #6 — ICP Fit & "Why Now" Scoring ────────────────────────────
icp_scoring:
  # Jobs×Tate framework — Fit / Intent / Timing.
  fit_weights:
    persona_tier: 0.30
    deal_volume: 0.20          # MUST match the sub-score key compute_fit() emits.
    role_seniority: 0.20       # Prior key `company_size` resolved to 0.0 via
    tech_maturity: 0.15        # sub.get(k, 0.0) — silently dead-weighting 20% of
    team_size: 0.15            # Fit and capping every contact's Fit at 0.80.
  intent_weights:
    semantic_pain_match: 0.40
    engagement_recency: 0.30
    engagement_volume: 0.30
  timing_weights:
    days_since_last_touch: 0.50
    stage_velocity: 0.30
    deal_age: 0.20
  final_weights:
    high_velocity:               { fit: 0.40, intent: 0.45, timing: 0.15 }
    system_multiplier:           { fit: 0.55, intent: 0.25, timing: 0.20 }
    capital_allocator:           { fit: 0.50, intent: 0.30, timing: 0.20 }
    default:                     { fit: 0.40, intent: 0.35, timing: 0.25 }
  score_segments:
    hot: 0.75
    warm: 0.50
    watchlist: 0.30
  # rag_query_templates moved to Obsidian vault:
  # revenue/icp-scoring/rag-query-templates.md (canonical source of truth)
  # mcp-icp-scoring reads from vault at startup. No fallback here — vault
  # unavailability at boot is a hard error; stale agents.yaml is worse.
  max_shortlist_size: 15

# ─── Agent #7 — Offer Matching & Playbook ──────────────────────────────
offer_matching:
  rag_similarity_threshold: 0.78
  # Pricing bands moved to top-level `offer_packages[*].price_band`.
  # Agent reads packages from there; no duplication.

# ─── Agent #8 — Meeting Intelligence & Blueprint ───────────────────────

# ─── Agent #9 — Build Orchestrator ─────────────────────────────────────
build_orchestrator:
  # ── Trigger (TWATR-T): event-driven (blueprint.approved / rd_proposal.approved)
  # + reactive #orch. No cron — builds are demand-driven by upstream approvals.
  # ── Cognition (TWATR-A): single-shot Opus blueprint→TaskSpec[] decompose, then a
  # deterministic topological sort. The orchestrator's real work is deterministic
  # external-pipeline driving (Cursor: issue→branch→inject→poll→CI), NOT an LLM loop.
  # ── HITL (TWATR): gate G3 (deploy/infra) sits BEFORE merge_tasks — merge-to-main is
  # the deploy trigger, so the founder approves before anything ships. merge_pr also
  # requires an automated VALIDATOR approval (second guard).
  cognition:
    engine: claude_router_single_shot
    tier: heavy
  # Dual mode: internal-OS work vs. client-deliverable work. Client mode
  # drops artifacts into Google Docs inside a per-client Drive folder.
  modes: ["internal", "client"]
  branching_convention: "feat/{mode}/{client_slug}/{task_slug}"
  ci_poll_interval_seconds: 30
  client_deliverables:
    root_drive_folder_env: "GOOGLE_CLIENT_DELIVERABLES_FOLDER_ID"
    per_client_subfolder_template: "{client_slug}"
    doc_types: ["proposal", "sow", "blueprint", "weekly_update", "handoff"]
  task_granularity_guidelines:
    max_files_changed: 8
    max_logical_units: 1
    must_have_acceptance_criteria: true

