            label: "Relevance AI Blog"

  # ─── HEALER (RSI Agent #16) ──────────────────────────────────────────
  healer:
    # Metric thresholds above which a config_patch auto-applies without HITL
    auto_patch_thresholds:
      error_rate: 0.30          # 30%+ error rate -> auto-patch backoff
      latency_p95_ms: 30000     # 30s p95 -> auto-patch timeout
    # Safety ceilings HEALER may never write above
    max_allowed_backoff_seconds: 600
    max_allowed_timeout_seconds: 120
    # LangSmith project name (leave empty to skip trace pull)
    langsmith_project: ""
    model_tier: SONNET

  # ─── DEPLOYER (Agentic Factory Agent #18) ───────────────────────────
  deployer:
    railway_service_id: ""          # set via RAILWAY_SERVICE_ID env var
    smoke_test_timeout_s: 60
    health_path: "/api/v1/health"
    rollback_on_failure: true

  # ─── QA_TESTER (Agent #32) — Build Quality Gate ────────────────────────────
  qa_tester:
    # Trigger: event-driven (build.task.completed).
    # Cognition: hybrid — deterministic subprocess test execution + coverage gate;
    #   LLM (Sonnet) ONLY on failure to synthesize root-cause narrative from pytest output.
    #   The verdict (pass/fail) is purely arithmetic — LLM never decides outcome.
    # HITL: founder review on test failure (actionable: fix or override).
    cognition:
      engine: claude_router_conditional  # LLM only on failure path
      tier: default
    coverage_threshold: 0.70
    test_timeout_sec: 120
    hitl_on_failure: true

  # ─── COMPLIANCE_CHECKER (Agent #33) — Business Rule Enforcement ────────────
  compliance_checker:
    # Trigger: cron (nightly 01:00 America/Toronto) + event:client.onboarded.
    # Cognition: deterministic — CC-1 cost cap, CC-2 data retention, CC-3 API whitelist.
    #   LLM (Sonnet) ONLY on Monday for weekly trend report narrative.
    # HITL: critical violations get immediate founder review cards.
    triggers:
      - cron
      - event:client.onboarded
      - event:deployment.live
    schedule:
      cron: "0 1 * * *"   # 01:00 America/Toronto nightly
    cognition:
      engine: deterministic_with_weekly_llm_report
      tier: default
    scan_window_hours: 24
    data_retention_days: 90
    weekly_report_day: 0   # 0 = Monday

  # ─── SECURITY_AUDITOR (Agent #34) — Proactive Security Scanning ────────────
  security_auditor:
    # Trigger: cron (nightly 00:30 America/Toronto) + event:deployment.live.
    # Cognition: deterministic — secret regex scan, pip-audit CVE check, endpoint grep.
    #   LLM (Sonnet) ONLY on Monday for executive security brief narrative.
    # HITL: critical findings (secrets, critical CVEs) get immediate HITL escalation.
    triggers:
      - cron
      - event:deployment.live
    schedule:
      cron: "30 0 * * *"   # 00:30 America/Toronto nightly
    cognition:
      engine: deterministic_with_weekly_llm_brief
      tier: default
    weekly_report_day: 0   # 0 = Monday

  # ─── Rate limits (consumed by clients + scheduler) ───────────────────
  rate_limits:
    firecrawl:  { rpm: 30 }
    feedparser: { req_per_feed_sec: 1 }
    gmail:      { send_per_min: 10 }
    anthropic:  { tpm: 200000 }
    serpapi:    { req_per_query_sec: 2 }
    railway:    { req_per_min: 60 }
    supabase_management: { req_per_min: 30 }
